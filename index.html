<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESL Sound Card SD-X1 | Single-Stream</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');

        :root {
            --bg-black: #050505;
            --panel-bg: #0d0d0d;
            --accent-cyan: #00f2ff;
            --accent-pink: #ff007b;
            --text-gray: #666;
        }

        body {
            background-color: var(--bg-black);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
        }

        .chassis {
            width: 95%;
            max-width: 1200px;
            background: var(--panel-bg);
            border: 1px solid #1a1a1a;
            border-radius: 12px;
            padding: 2px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        .rgb-strip {
            height: 3px;
            width: 100%;
            background: linear-gradient(90deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            background-size: 200%;
            animation: moveStrip 5s linear infinite;
            border-radius: 10px 10px 0 0;
        }

        @keyframes moveStrip { 0% { background-position: 0% 0%; } 100% { background-position: 200% 0%; } }

        .header {
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1a1a1a;
        }

        .title-block h1 { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; color: var(--accent-cyan); margin: 0; text-transform: uppercase; letter-spacing: 4px; }
        
        .main-deck { padding: 30px; min-height: 400px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }

        .pad-unit {
            background: rgba(255,255,255,0.02);
            border-radius: 8px;
            padding: 10px;
            border: 1px solid #222;
        }

        .sound-pad {
            background: #0a0a0a;
            border-radius: 6px;
            padding: 15px 5px;
            cursor: pointer;
            text-align: center;
            border: 1px solid transparent;
            transition: 0.3s;
        }

        .sound-pad:hover { background: #111; border-color: #333; }
        .pad-emoji { font-size: 1.5rem; display: block; margin-bottom: 5px; }
        .pad-name { font-size: 0.75rem; font-weight: 700; color: #aaa; text-transform: uppercase; }

        /* Playing state */
        .playing { border-color: var(--accent-cyan) !important; background: #001a1c !important; box-shadow: inset 0 0 15px rgba(0, 242, 255, 0.1); }
        .playing .pad-name { color: var(--accent-cyan); }

        .pad-settings {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #1a1a1a;
            display: none;
            flex-direction: column;
            gap: 5px;
        }
        .pad-unit:hover .pad-settings { display: flex; }

        .trim-controls { display: flex; gap: 5px; align-items: center; }
        .trim-label { font-size: 0.55rem; color: #666; min-width: 30px; }

        input { background: #000; border: 1px solid #333; color: #00f2ff; font-size: 0.6rem; padding: 3px; border-radius: 3px; }

        .deck-footer { padding: 15px 30px; display: flex; justify-content: space-between; border-top: 1px solid #1a1a1a; }
        .btn-ui { background: transparent; border: 1px solid #333; color: var(--accent-cyan); padding: 6px 14px; border-radius: 4px; font-family: 'Orbitron', sans-serif; font-size: 0.6rem; cursor: pointer; }
    </style>
</head>
<body>

    <div class="chassis">
        <div class="rgb-strip"></div>
        <div class="header">
            <div class="title-block">
                <h1>ESL SOUND CARD</h1>
                <p>SD-X1 • SINGLE STREAM v4.0</p>
            </div>
        </div>

        <div class="main-deck">
            <div id="grid" class="grid"></div>
        </div>

        <div class="deck-footer">
            <div style="display: flex; gap: 10px;">
                <button class="btn-ui" onclick="addNewPad()">+ ADD BUTTON</button>
                <button class="btn-ui" style="color:var(--accent-pink)" onclick="exportData()">💾 BACKUP</button>
                <button class="btn-ui" style="color:#555" onclick="document.getElementById('importFile').click()">📂 LOAD</button>
                <input type="file" id="importFile" style="display:none" onchange="importData(event)">
            </div>
        </div>
    </div>

    <script>
        const storageKey = 'TeacherDave_Final_v4';
        
        let pads = JSON.parse(localStorage.getItem(storageKey)) || [
            { name: 'Correct', emoji: '✅', src: 'https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3', speed: 1, start: 0, end: 0 }
        ];

        // Global variables to track the SINGLE playing sound
        let currentAudio = null;
        let currentIdx = null;
        let trimInterval = null;

        function sync() { localStorage.setItem(storageKey, JSON.stringify(pads)); }

        function stopCurrent() {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }
            if (trimInterval) clearInterval(trimInterval);
            
            // Remove glow from all buttons
            document.querySelectorAll('.sound-pad').forEach(p => p.classList.remove('playing'));
            
            currentAudio = null;
            currentIdx = null;
        }

        function render() {
            const container = document.getElementById('grid');
            container.innerHTML = '';
            
            pads.forEach((pad, idx) => {
                const unit = document.createElement('div');
                unit.className = 'pad-unit';
                
                const btn = document.createElement('div');
                btn.className = 'sound-pad';
                btn.id = `pad-${idx}`;
                btn.innerHTML = `<span class="pad-emoji">${pad.emoji}</span><span class="pad-name">${pad.name}</span>`;
                
                btn.onclick = () => {
                    // 1. If clicking the SAME button that is already playing, just stop it.
                    if (currentIdx === idx) {
                        stopCurrent();
                        return;
                    }

                    // 2. If something else is playing, stop it first.
                    stopCurrent();

                    // 3. Play the new sound
                    const audio = new Audio(pad.src);
                    audio.playbackRate = pad.speed || 1;
                    audio.currentTime = pad.start || 0;
                    
                    currentAudio = audio;
                    currentIdx = idx;
                    btn.classList.add('playing');
                    
                    audio.play();

                    // Trim & Completion logic
                    trimInterval = setInterval(() => {
                        if (pad.end > 0 && audio.currentTime >= pad.end) {
                            stopCurrent();
                        }
                    }, 50);

                    audio.onended = () => stopCurrent();
                };

                unit.appendChild(btn);

                // Settings UI
                const settings = document.createElement('div');
                settings.className = 'pad-settings';

                const nameIn = document.createElement('input');
                nameIn.value = pad.name; nameIn.onchange = (e) => { pads[idx].name = e.target.value; sync(); render(); };
                
                const emojiIn = document.createElement('input');
                emojiIn.value = pad.emoji; emojiIn.onchange = (e) => { pads[idx].emoji = e.target.value; sync(); render(); };

                const trimS = document.createElement('div');
                trimS.className = 'trim-controls';
                trimS.innerHTML = `<span class="trim-label">START</span>`;
                const sIn = document.createElement('input');
                sIn.type = 'number'; sIn.step = '0.1'; sIn.value = pad.start || 0;
                sIn.onchange = (e) => { pads[idx].start = parseFloat(e.target.value); sync(); };
                trimS.appendChild(sIn);

                const trimE = document.createElement('div');
                trimE.className = 'trim-controls';
                trimE.innerHTML = `<span class="trim-label">END</span>`;
                const eIn = document.createElement('input');
                eIn.type = 'number'; eIn.step = '0.1'; eIn.value = pad.end || 0;
                eIn.onchange = (e) => { pads[idx].end = parseFloat(e.target.value); sync(); };
                trimE.appendChild(eIn);

                const fileIn = document.createElement('input');
                fileIn.type = 'file';
                fileIn.onchange = (e) => {
                    const reader = new FileReader();
                    reader.onload = (ev) => { pads[idx].src = ev.target.result; sync(); render(); };
                    reader.readAsDataURL(e.target.files[0]);
                };

                const del = document.createElement('button');
                del.innerText = "DELETE"; del.style.background="none"; del.style.border="none"; del.style.color="#444"; del.style.fontSize="9px"; del.style.cursor="pointer";
                del.onclick = (e) => { e.stopPropagation(); pads.splice(idx,1); sync(); render(); };

                settings.appendChild(emojiIn);
                settings.appendChild(nameIn);
                settings.appendChild(trimS);
                settings.appendChild(trimE);
                settings.appendChild(fileIn);
                settings.appendChild(del);
                unit.appendChild(settings);
                container.appendChild(unit);
            });
        }

        function addNewPad() { pads.push({ name: 'NEW', emoji: '🎵', src: '', speed: 1, start: 0, end: 0 }); sync(); render(); }
        function exportData() {
            const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(JSON.stringify(pads));
            const link = document.createElement('a'); link.href = dataUri; link.download = 'TeacherDave_SDX1_Final.json'; link.click();
        }
        function importData(e) {
            const reader = new FileReader();
            reader.onload = (ev) => { pads = JSON.parse(ev.target.result); sync(); render(); };
            reader.readAsText(e.target.files[0]);
        }

        render();
    </script>
</body>
</html>
